services:
  - type: web
    name: deenguide-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: QURAN_FOUNDATION_CLIENT_ID
        sync: false
      - key: QURAN_FOUNDATION_CLIENT_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
